name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - worker/**
      - package.json
      - package-lock.json
      - .github/workflows/deploy_worker.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject D1 database id
        run: sed -i "s/REPLACE_WITH_D1_DATABASE_ID/${CF_D1_DATABASE_ID}/" worker/wrangler.toml

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply DB --remote --config worker/wrangler.toml

      - name: Deploy worker
        run: npx wrangler deploy --config worker/wrangler.toml
