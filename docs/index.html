<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CNU Meal Rating</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="container">
      <header class="hero">
        <p class="hero-kicker">CNU Meal 5-Star Vote</p>
        <h1>오늘의 학식 평점</h1>
        <p class="hero-sub">Rate today’s meals in Korean and English.</p>
        <div class="meta-grid">
          <div class="meta-card">
            <span class="meta-label">Service Date</span>
            <strong id="service-date">-</strong>
          </div>
          <div class="meta-card">
            <span class="meta-label">Vote Day Key</span>
            <strong id="vote-day-key">-</strong>
          </div>
          <div class="meta-card">
            <span class="meta-label">Last Sync</span>
            <strong id="generated-at">-</strong>
          </div>
        </div>
      </header>

      <section class="panel">
        <div class="section-head">
          <h2>Top Rated Today</h2>
          <button id="refresh-button" class="btn-secondary" type="button">Refresh</button>
        </div>
        <div id="leaderboard" class="leaderboard"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Today’s Meals</h2>
        </div>
        <div class="toolbar" id="meal-toolbar">
          <label class="toolbar-field">
            <span>Date</span>
            <input id="filter-date" type="date" />
          </label>
          <label class="toolbar-field">
            <span>Meal</span>
            <select id="filter-period">
              <option value="all">All</option>
              <option value="조식">조식</option>
              <option value="중식">중식</option>
              <option value="석식">석식</option>
            </select>
          </label>
          <label class="toolbar-field">
            <span>Audience</span>
            <select id="filter-audience">
              <option value="all">All</option>
              <option value="학생">학생</option>
              <option value="직원">직원</option>
            </select>
          </label>
          <label class="toolbar-field">
            <span>Sort</span>
            <select id="sort-mode">
              <option value="recommended">추천순</option>
              <option value="rating">평점순</option>
              <option value="price_asc">가격 낮은순</option>
              <option value="price_desc">가격 높은순</option>
            </select>
          </label>
          <label class="toolbar-toggle">
            <input id="toggle-english" type="checkbox" />
            <span>English</span>
          </label>
          <button id="today-button" class="btn-secondary" type="button">Today</button>
        </div>
        <p id="status" class="status"></p>
        <div id="meals-root" class="meals-root"></div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
