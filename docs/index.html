<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CNU Meal Rating</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="container">
      <header class="hero">
        <p class="hero-kicker">CNU Meal Rating</p>
        <h1>오늘의 학식 별점</h1>
        <p class="hero-sub">기본은 한국어로 보여드리고, 필요할 때만 영어 메뉴를 함께 표시합니다.</p>
        <div class="meta-grid">
          <div class="meta-card">
            <span class="meta-label">제공일</span>
            <strong id="service-date">-</strong>
          </div>
          <div class="meta-card">
            <span class="meta-label">투표 기준일</span>
            <strong id="vote-day-key">-</strong>
          </div>
          <div class="meta-card">
            <span class="meta-label">마지막 업데이트</span>
            <strong id="generated-at">-</strong>
          </div>
        </div>
      </header>

      <section class="panel">
        <div class="section-head">
          <h2>오늘의 인기 메뉴</h2>
          <button id="refresh-button" class="btn-secondary" type="button">새로고침</button>
        </div>
        <div id="leaderboard" class="leaderboard"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>오늘의 식단</h2>
        </div>
        <div class="toolbar" id="meal-toolbar">
          <label class="toolbar-field toolbar-date">
            <span>날짜</span>
            <input id="filter-date" type="date" />
          </label>
          <label class="toolbar-field toolbar-period">
            <span>식사 시간</span>
            <select id="filter-period">
              <option value="all">전체</option>
              <option value="조식">조식</option>
              <option value="중식">중식</option>
              <option value="석식">석식</option>
            </select>
          </label>
          <label class="toolbar-field toolbar-audience">
            <span>이용 대상</span>
            <select id="filter-audience">
              <option value="all">전체</option>
              <option value="학생">학생</option>
              <option value="직원">직원</option>
            </select>
          </label>
          <label class="toolbar-field toolbar-sort">
            <span>정렬</span>
            <select id="sort-mode">
              <option value="recommended">추천 순</option>
              <option value="rating">평점 순</option>
              <option value="price_asc">가격 낮은 순</option>
              <option value="price_desc">가격 높은 순</option>
            </select>
          </label>
          <label class="toolbar-toggle toolbar-english" for="toggle-english">
            <input id="toggle-english" type="checkbox" />
            <span class="toggle-ui" aria-hidden="true"></span>
            <span class="toggle-text">English</span>
          </label>
          <button id="today-button" class="btn-secondary btn-today" type="button">오늘</button>
          <nav id="mobile-cafeteria-jump" class="mobile-jump" aria-label="식당 빠르게 이동"></nav>
        </div>
        <p id="status" class="status"></p>
        <div id="meals-root" class="meals-root"></div>
      </section>

      <footer class="site-footer">
        원본 식단 출처:
        <a href="https://mobileadmin.cnu.ac.kr/food/index.jsp" target="_blank" rel="noopener noreferrer">
          충남대학교 식당메뉴
        </a>
      </footer>
    </main>

    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
